<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify - Lettore web</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./assets/CSS/reset-style.css" />
    <link rel="stylesheet" href="./assets/CSS/new-style.css" />
    <link rel="stylesheet" href="./assets/CSS/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header id="contenitore-menù-sup">
      <!-- LOGO SPOTIFY A SINISTRA -->
      <img
        id="logo"
        src="./assets/IMG/Spotify_Primary_Logo_RGB_White.png"
        alt="Spotify logo"
      />

      <!-- BLOCCO CENTRALE -->
      <div id="barra-ricerca">
        <!-- ICONA HOME -->
        <div>
          <button id="bottone-home" class="bottone">
            <i class="bi bi-house-door-fill"></i>
          </button>
        </div>
        <!-- BARRA DI RICERCA CENTRALE -->
        <div id="blocco-centrale-ricerca">
          <button id="bottone-lente" class="bottone">
            <i class="bi bi-search"></i>
          </button>
          <input type="text" placeholder="Cosa vuoi ascoltare?" />
          <button id="archivio">
            <div>
              <i class="bi bi-archive"></i>
            </div>
          </button>
        </div>
      </div>
      <!-- BLOCCO FINALE -->
      <div>
        <div id="blocco-finale">
          <div id="sezione-download">
            <a href="#">
              <button id="bottone-download" class="bottone-grigio">
                <i id="icona-download" class="bi bi-arrow-down-circle"></i>
                <p>Installa app</p>
              </button>
            </a>
            <button id="bottone-campana" class="bottone-grigio">
              <i id="icona-campana" class="bi bi-bell"></i>
            </button>
            <button id="bottone-gruppo" class="bottone-grigio">
              <i id="icona-gruppo" class="bi bi-people"></i>
            </button>
            <img
              class="bordo-foto"
              id="foto-profilo"
              src="https://placecats.com/32/32"
              alt="Foto profilo"
            />
          </div>
        </div>
      </div>
    </header>
    <main>
      <!-- SEZIONE LATERALE SINISTRA -->
      <div id="menù-laterale">
        <div id="header-libreria">
          <div>
            <h1><b>La tua libreria</b></h1>
          </div>
          <div id="header-libreria-destra">
            <button>
              <i class="icona-sx fas fa-plus"></i>
              <h1><b>Crea</b></h1>
            </button>
            <a href="#"><i class="icona-sx fas fa-expand-alt"></i></a>
          </div>
        </div>
        <div id="bottoni-libreria">
          <button>Playlist</button>
          <button>Album</button>
        </div>
      </div>
      <div></div>
      <div></div>
    </main>
    <footer></footer>
  </body>
</html>
